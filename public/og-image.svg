<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: warm dark matching site palette -->
  <rect width="1200" height="630" fill="#14100d"/>
  <!-- Subtle warm gradient overlay -->
  <rect width="1200" height="630" fill="url(#grad)" opacity="0.4"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14100d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Decorative accent line -->
  <rect x="100" y="180" width="60" height="4" fill="#c9a96e" rx="2"/>
  <!-- Main wordmark -->
  <text x="100" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="#f0ebe6" letter-spacing="-2">clawhub</text>
  <text x="728" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="400" fill="#c9a96e" letter-spacing="-2">.md</text>
  <!-- Tagline -->
  <text x="100" y="390" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#a09080" letter-spacing="0.5">Curated skills for OpenClaw and Claude Code agents</text>
  <!-- Bottom subtle accent -->
  <rect x="100" y="460" width="1000" height="1" fill="#2a2018" />
  <text x="100" y="500" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#5a4a3a" letter-spacing="0.5">clawhub.md</text>
</svg>
